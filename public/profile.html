<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Профиль - Kryazh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ============= ВСЕ ТЕМЫ ============= */
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --border: #e0e0e0;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --primary: #764ba2;
            --primary-dark: #6a3d96;
            --hover: #f0f0f0;
            --shadow: 0 1px 2px rgba(0,0,0,0.1);
            --success: #4caf50;
            --warning: #ff9800;
        }


        [data-theme="dark"] {
            --bg: #0f0f0f;
            --surface: #1e1e1e;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --text-secondary: #aaaaaa;
            --primary: #9b6fc4;
            --hover: #252525;
            --shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        [data-theme="wild"] {
            --bg: #2d3e2b;
            --surface: #4a6e3a;
            --border: #6a8e5a;
            --text: #f5e6c4;
            --text-secondary: #d4c4a4;
            --primary: #c9a87b;
            --hover: #5a7e4a;
        }

        [data-theme="barbie"] {
            --bg: #ffd1dc;
            --surface: #fff0f3;
            --border: #ffb6c1;
            --text: #c21e56;
            --text-secondary: #e8436e;
            --primary: #ff69b4;
            --hover: #ffe4e9;
        }

        [data-theme="cyber"] {
            --bg: #0a0a0f;
            --surface: #15151f;
            --border: #2a2a3a;
            --text: #00ffff;
            --text-secondary: #66ffff;
            --primary: #ff00ff;
            --hover: #1a1a2a;
        }

        [data-theme="ПАША"] {
            --bg: #edeef0;
            --surface: #ffffff;
            --border: #d3d9de;
            --text: #2c3e50;
            --text-secondary: #6c7a89;
            --primary: #5181b8;
            --hover: #f0f2f5;
        }

        [data-theme="newhorizons"] {
            --bg: #9fd3c7;
            --surface: #fffef7;
            --border: #e2dcc7;
            --text: #5b6e4a;
            --text-secondary: #8b9a6e;
            --primary: #f7b05e;
            --hover: #fff5e6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 24px;
            text-decoration: none;
            color: var(--text);
            font-size: 14px;
        }

        /* Обложка */
        .banner-container {
            width: 100%;
            height: 180px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: -50px;
            position: relative;
            z-index: 0;
        }

        .profile-banner {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 1;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary);
            margin: -50px auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            overflow: hidden;
            border: 4px solid var(--surface);
            position: relative;
            z-index: 2;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Статус */
        .user-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: var(--hover);
        }

        .status-online { color: #4caf50; }
        .status-away { color: #ff9800; }
        .status-busy { color: #f44336; }

        .status-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .profile-role {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 16px;
        }

        /* Bio */
        .user-bio {
            background: var(--hover);
            padding: 12px 16px;
            border-radius: 16px;
            margin: 16px 0;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
        }

        /* Информация о пользователе */
        .user-info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 14px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        .user-info-icon {
            width: 24px;
            font-size: 16px;
        }

        /* Репутация */
        .reputation-block {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .reputation-points {
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .reputation-icon {
            font-size: 32px;
        }

        .reputation-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .reputation-history {
            margin-top: 16px;
            text-align: left;
            font-size: 13px;
            max-height: 200px;
            overflow-y: auto;
        }

        .reputation-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .reputation-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .reputation-name {
            font-weight: 500;
            flex: 1;
        }

        .reputation-date {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .reputation-points-small {
            font-weight: bold;
            color: var(--primary);
        }

        /* Социальные сети */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 16px 0;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--hover);
            text-decoration: none;
            font-size: 20px;
            transition: transform 0.2s;
        }

        .social-link:hover {
            transform: scale(1.1);
        }

        /* Кнопки */
        .friend-action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 8px;
            width: 100%;
        }

        .friend-status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 14px;
            margin-top: 8px;
        }

        .friend-status.pending {
            background: var(--warning);
            color: white;
        }

        .friend-status.accepted {
            background: var(--success);
            color: white;
        }

        /* Каналы */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0 12px;
        }

        .channel-item {
            background: var(--surface);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .channel-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .channel-info {
            flex: 1;
        }

        .channel-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .channel-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .loading, .empty {
            text-align: center;
            padding: 40px;
            background: var(--surface);
            border-radius: 16px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .banner-container {
                height: 140px;
            }
            .profile-avatar {
                width: 80px;
                height: 80px;
                font-size: 36px;
                margin-top: -40px;
            }
            .profile-name {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Назад к чатам</a>
        <div id="content">
            <div class="loading">⏳ Загрузка...</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Применяем тему
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        let currentUser = null;
        let targetUser = null;
        let socket = null;

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }

        function formatBirthday(dateStr) {
            if (!dateStr) return null;
            const date = new Date(dateStr);
            const today = new Date();
            let age = today.getFullYear() - date.getFullYear();
            const m = today.getMonth() - date.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < date.getDate())) {
                age--;
            }
            return { date: formatDate(dateStr), age: age };
        }

        // Статус эмодзи
        function getStatusEmoji(statusType) {
            switch(statusType) {
                case 'online': return '🟢';
                case 'away': return '🌙';
                case 'busy': return '🔴';
                default: return '🟢';
            }
        }

        function getStatusText(statusType) {
            switch(statusType) {
                case 'online': return 'В сети';
                case 'away': return 'Отошёл';
                case 'busy': return 'Не беспокоить';
                default: return 'В сети';
            }
        }

        // Проверка статуса дружбы
        async function checkFriendStatus(targetUserId) {
            try {
                const res = await fetch(`/api/friends/status/${targetUserId}`, { 
                    credentials: 'include' 
                });
                return await res.json();
            } catch (err) {
                console.error('Ошибка проверки статуса:', err);
                return { status: 'none' };
            }
        }

        // Отправить заявку в друзья
        async function sendFriendRequest(targetUserId) {
            try {
                const res = await fetch(`/api/friends/request/${targetUserId}`, {
                    method: 'POST',
                    credentials: 'include'
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Заявка отправлена!');
                    loadProfile();
                } else {
                    alert(data.error || 'Ошибка');
                }
            } catch (err) {
                alert('Ошибка соединения');
            }
        }

        // Загрузка профиля
        async function loadProfile() {
            const container = document.getElementById('content');
            
            try {
                // Получаем данные пользователя
                let user;
                if (userId) {
                    const res = await fetch(`/api/users/${userId}`, { credentials: 'include' });
                    if (!res.ok) throw new Error('Пользователь не найден');
                    user = await res.json();
                    targetUser = user;
                } else {
                    const res = await fetch('/api/me', { credentials: 'include' });
                    user = await res.json();
                    targetUser = user;
                }
                
                // Получаем расширенный профиль
                const profileRes = await fetch(`/api/users/${user.id}/profile`, { credentials: 'include' });
                const profile = await profileRes.json();
                
                // Получаем каналы пользователя
                const channelsRes = await fetch(`/api/users/${user.id}/channels`, { credentials: 'include' });
                const channels = await channelsRes.json();
                
                // Получаем репутацию
                const repRes = await fetch(`/api/users/${user.id}/reputation`, { credentials: 'include' });
                const repData = await repRes.json();
                
                const roleText = user.role === 'admin' ? '👑 Администратор' : '👤 Пользователь';
                const avatarHtml = user.avatar 
                    ? `<img src="${user.avatar}">` 
                    : user.username[0].toUpperCase();
                const date = formatDate(user.created_at);
                const birthday = profile.birthday ? formatBirthday(profile.birthday) : null;
                
                // Статус
                const statusEmoji = getStatusEmoji(profile.status_type);
                const statusText = getStatusText(profile.status_type);
                const customStatusText = profile.status_text ? ` • ${escapeHtml(profile.status_text)}` : '';
                
                // Проверяем статус дружбы
                let friendActionHtml = '';
                if (currentUser && user.id !== currentUser.id) {
                    const friendStatus = await checkFriendStatus(user.id);
                    
                    if (friendStatus.status === 'none') {
                        friendActionHtml = `<button class="friend-action-btn" onclick="sendFriendRequest(${user.id})">➕ Добавить в друзья</button>`;
                    } else if (friendStatus.status === 'pending') {
                        friendActionHtml = `<div class="friend-status pending">⏳ Заявка отправлена</div>`;
                    } else if (friendStatus.status === 'accepted') {
                        friendActionHtml = `<div class="friend-status accepted">✓ Вы друзья</div>`;
                    }
                }
                
                // Кнопка редактирования (для своего профиля)
                let editButtonHtml = '';
                if (!userId || user.id === currentUser?.id) {
                    editButtonHtml = `<button class="friend-action-btn" id="editProfileBtn">✏️ Редактировать профиль</button>`;
                }
                
                // Bio
                const bioHtml = profile.bio ? `
                    <div class="user-bio">
                        ${escapeHtml(profile.bio)}
                    </div>
                ` : '';
                
                // Информация
                let infoHtml = '';
                if (profile.city) {
                    infoHtml += `
                        <div class="user-info-item">
                            <span class="user-info-icon">🏙️</span>
                            <span>${escapeHtml(profile.city)}</span>
                        </div>
                    `;
                }
                if (birthday) {
                    infoHtml += `
                        <div class="user-info-item">
                            <span class="user-info-icon">🎂</span>
                            <span>${birthday.date} (${birthday.age} лет)</span>
                        </div>
                    `;
                }
                if (profile.website) {
                    infoHtml += `
                        <div class="user-info-item">
                            <span class="user-info-icon">🌐</span>
                            <a href="${escapeHtml(profile.website)}" target="_blank" style="color: var(--primary);">${escapeHtml(profile.website)}</a>
                        </div>
                    `;
                }
                
                // Социальные сети
                let socialHtml = '';
                const socials = [];

if (profile.social_vk) {
    let vkUrl = profile.social_vk;
    // Если username (буквы), то ссылка на /id, если цифры, то /club или /id
    if (/^\d+$/.test(profile.social_vk)) {
        vkUrl = `id${profile.social_vk}`;
    }
    socials.push({ 
        url: `https://vk.com/${vkUrl}`, 
        icon: '📘', 
        name: 'ВКонтакте' 
    });
}
if (profile.social_tg) {
    socials.push({ 
        url: `https://t.me/${profile.social_tg.replace('@', '')}`, 
        icon: '📱', 
        name: 'Telegram' 
    });
}
if (profile.social_custom && profile.social_custom_name) {
    socials.push({ 
        url: profile.social_custom, 
        icon: '🔗', 
        name: profile.social_custom_name 
    });
}
if (profile.website) {
    socials.push({ 
        url: profile.website, 
        icon: '🌐', 
        name: 'Сайт' 
    });
}                
                if (socials.length > 0) {
                    socialHtml = `
                        <div class="social-links">
                            ${socials.map(s => `<a href="${s.url}" target="_blank" class="social-link" title="${s.name}">${s.icon}</a>`).join('')}
                        </div>
                    `;
                }
                
                // Обложка
                const bannerHtml = profile.banner ? `
                    <div class="banner-container">
                        <img class="profile-banner" src="${profile.banner}">
                    </div>
                ` : '<div class="banner-container" style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);"></div>';
                
                // Список каналов
                let channelsHtml = '';
                if (channels.length === 0) {
                    channelsHtml = '<div class="empty">📭 Нет каналов или групп</div>';
                } else {
                    channelsHtml = channels.map(ch => `
                        <div class="channel-item" onclick="window.location.href='/channel.html?id=${ch.id}'">
                            <div class="channel-avatar">${ch.type === 'channel' ? '📢' : '👥'}</div>
                            <div class="channel-info">
                                <div class="channel-name">${escapeHtml(ch.name)}</div>
                                <div class="channel-desc">${escapeHtml(ch.description || 'Нет описания')}</div>
                            </div>
                        </div>
                    `).join('');
                }
                
                container.innerHTML = `
                    ${bannerHtml}
                    <div class="profile-card">
                        <div class="profile-avatar">${avatarHtml}</div>
                        <div class="profile-name">${escapeHtml(user.username)}</div>
                        <div class="user-status">
                            <span class="status-badge">
                                ${statusEmoji} ${statusText}
                            </span>
                            ${customStatusText ? `<span class="status-text">${customStatusText}</span>` : ''}
                        </div>
                        <div class="profile-role">${roleText}</div>
                        
                        ${bioHtml}
                        ${infoHtml}
                        ${socialHtml}
                        
                        <div class="reputation-block">
                            <div class="reputation-stats">
                                <div class="reputation-points">
                                    <span class="reputation-icon">⭐</span>
                                    <span id="reputationPoints">${repData.points || 0}</span>
                                    <span class="reputation-label">репутации</span>
                                </div>
                            </div>
                            <div id="reputationHistory" class="reputation-history"></div>
                        </div>
                        
                        <div class="profile-stats">
                            <div class="stat">
                                <div class="stat-value">${channels.length}</div>
                                <div class="stat-label">каналов/групп</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${date}</div>
                                <div class="stat-label">с нами с</div>
                            </div>
                        </div>
                        
                        ${friendActionHtml}
                        ${editButtonHtml}
                    </div>
                    <div class="section-title">📢 Каналы и группы</div>
                    ${channelsHtml}
                `;
                
                // История репутации
                const historyContainer = document.getElementById('reputationHistory');
                if (repData.recent && repData.recent.length > 0) {
                    historyContainer.innerHTML = repData.recent.map(item => `
                        <div class="reputation-item">
                            <img class="reputation-avatar" src="${item.avatar || ''}" onerror="this.style.display='none'">
                            <span class="reputation-name">${escapeHtml(item.username)}</span>
                            <span class="reputation-date">${formatDate(item.created_at)}</span>
                            <span class="reputation-points-small">+${item.points}</span>
                        </div>
                    `).join('');
                } else {
                    historyContainer.innerHTML = '<div style="text-align: center; padding: 16px;">Пока никто не оценил</div>';
                }
                
                // Кнопка редактирования
                const editBtn = document.getElementById('editProfileBtn');
                if (editBtn) {
                    editBtn.onclick = () => {
                        window.location.href = '/profile-edit.html';
                    };
                }
                
            } catch (err) {
                console.error('Ошибка загрузки профиля:', err);
                document.getElementById('content').innerHTML = '<div class="empty">❌ Пользователь не найден</div>';
            }
        }
        
        // Инициализация
        async function init() {
            const res = await fetch('/api/me', { credentials: 'include' });
            if (!res.ok) {
                window.location.href = '/login.html';
                return;
            }
            currentUser = await res.json();
            
            // Подключаем WebSocket для обновления статусов
            socket = io();
            socket.emit('auth', currentUser.id);
            
            socket.on('user_status_changed', (data) => {
                if (userId && data.user_id == userId) {
                    loadProfile();
                }
            });
            
            await loadProfile();
        }
        
        init();
    </script>
</body>
</html>

        /* ============= ДОСТИЖЕНИЯ ============= */
.achievements-section {
    background: var(--surface);
    border-radius: 20px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: var(--shadow);
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
}

.section-header h3 {
    font-size: 18px;
    font-weight: 600;
}

.achievements-count {
    background: var(--primary);
    color: white;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.achievements-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 12px;
}

.achievement-card {
    background: var(--bg);
    border-radius: 16px;
    padding: 12px 8px;
    text-align: center;
    transition: all 0.2s;
    position: relative;
    cursor: pointer;
}

.achievement-card:hover {
    transform: translateY(-2px);
}

.achievement-card.earned {
    background: linear-gradient(135deg, var(--primary-light), var(--bg));
    border: 1px solid var(--primary);
}

.achievement-card.locked {
    opacity: 0.6;
    filter: grayscale(0.3);
}

.achievement-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 8px;
}

.achievement-name {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.achievement-desc {
    font-size: 10px;
    color: var(--text-secondary);
    line-height: 1.3;
}

.achievement-rarity {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 10px;
}

.rarity-common { color: #9e9e9e; }
.rarity-rare { color: #2196f3; }
.rarity-epic { color: #9c27b0; }
.rarity-legendary { color: #ff9800; }

/* Уведомление о новой ачивке */
.achievement-toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    padding: 14px 20px;
    border-radius: 30px;
    z-index: 10000;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    animation: slideInRight 0.3s ease;
    cursor: pointer;
}

.achievement-toast-icon {
    font-size: 28px;
}

.achievement-toast-content {
    flex: 1;
}

.achievement-toast-title {
    font-weight: 600;
    font-size: 14px;
}

.achievement-toast-desc {
    font-size: 12px;
    opacity: 0.9;
}

@keyframes slideInRight {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@media (max-width: 768px) {
    .achievements-grid {
        grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
        gap: 8px;
    }
    .achievement-icon {
        font-size: 28px;
    }
    .achievement-name {
        font-size: 10px;
    }
}

    <script>
        // Применяем тему
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        let currentUser = null;
        let targetUser = null;
        let socket = null;

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }

        function formatBirthday(dateStr) {
            if (!dateStr) return null;
            const date = new Date(dateStr);
            const today = new Date();
            let age = today.getFullYear() - date.getFullYear();
            const m = today.getMonth() - date.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < date.getDate())) {
                age--;
            }
            return { date: formatDate(dateStr), age: age };
        }

        // Статус эмодзи
        function getStatusEmoji(statusType) {
            switch(statusType) {
                case 'online': return '🟢';
                case 'away': return '🌙';
                case 'busy': return '🔴';
                default: return '🟢';
            }
        }

        function getStatusText(statusType) {
            switch(statusType) {
                case 'online': return 'В сети';
                case 'away': return 'Отошёл';
                case 'busy': return 'Не беспокоить';
                default: return 'В сети';
            }
        }

        // Проверка статуса дружбы
        async function checkFriendStatus(targetUserId) {
            try {
                const res = await fetch(`/api/friends/status/${targetUserId}`, { 
                    credentials: 'include' 
                });
                return await res.json();
            } catch (err) {
                console.error('Ошибка проверки статуса:', err);
                return { status: 'none' };
            }
        }

        // Отправить заявку в друзья
        async function sendFriendRequest(targetUserId) {
            try {
                const res = await fetch(`/api/friends/request/${targetUserId}`, {
                    method: 'POST',
                    credentials: 'include'
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Заявка отправлена!');
                    loadProfile();
                    await loadAchievements();
                } else {
                    alert(data.error || 'Ошибка');
                }
            } catch (err) {
                alert('Ошибка соединения');
            }
        }

        // Загрузка профиля
        async function loadProfile() {
            const container = document.getElementById('content');
            
            try {
                // Получаем данные пользователя
                let user;
                if (userId) {
                    const res = await fetch(`/api/users/${userId}`, { credentials: 'include' });
                    if (!res.ok) throw new Error('Пользователь не найден');
                    user = await res.json();
                    targetUser = user;
                } else {
                    const res = await fetch('/api/me', { credentials: 'include' });
                    user = await res.json();
                    targetUser = user;
                }
                
                // Получаем расширенный профиль
                const profileRes = await fetch(`/api/users/${user.id}/profile`, { credentials: 'include' });
                const profile = await profileRes.json();
                
                // Получаем каналы пользователя
                const channelsRes = await fetch(`/api/users/${user.id}/channels`, { credentials: 'include' });
                const channels = await channelsRes.json();
                
                // Получаем репутацию
                const repRes = await fetch(`/api/users/${user.id}/reputation`, { credentials: 'include' });
                const repData = await repRes.json();
                
                const roleText = user.role === 'admin' ? '👑 Администратор' : '👤 Пользователь';
                const avatarHtml = user.avatar 
                    ? `<img src="${user.avatar}">` 
                    : user.username[0].toUpperCase();
                const date = formatDate(user.created_at);
                const birthday = profile.birthday ? formatBirthday(profile.birthday) : null;
                
                // Статус
                const statusEmoji = getStatusEmoji(profile.status_type);
                const statusText = getStatusText(profile.status_type);
                const customStatusText = profile.status_text ? ` • ${escapeHtml(profile.status_text)}` : '';
                
                // Проверяем статус дружбы
                let friendActionHtml = '';
                if (currentUser && user.id !== currentUser.id) {
                    const friendStatus = await checkFriendStatus(user.id);
                    
                    if (friendStatus.status === 'none') {
                        friendActionHtml = `<button class="friend-action-btn" onclick="sendFriendRequest(${user.id})">➕ Добавить в друзья</button>`;
                    } else if (friendStatus.status === 'pending') {
                        friendActionHtml = `<div class="friend-status pending">⏳ Заявка отправлена</div>`;
                    } else if (friendStatus.status === 'accepted') {
                        friendActionHtml = `<div class="friend-status accepted">✓ Вы друзья</div>`;
                    }
                }
                
                // Кнопка редактирования (для своего профиля)
                let editButtonHtml = '';
                if (!userId || user.id === currentUser?.id) {
                    editButtonHtml = `<button class="friend-action-btn" id="editProfileBtn">✏️ Редактировать профиль</button>`;
                }
                
                // Bio
                const bioHtml = profile.bio ? `
                    <div class="user-bio">
                        ${escapeHtml(profile.bio)}
                    </div>
                ` : '';
                
                // Информация
                let infoHtml = '';
                if (profile.city) {
                    infoHtml += `
                        <div class="user-info-item">
                            <span class="user-info-icon">🏙️</span>
                            <span>${escapeHtml(profile.city)}</span>
                        </div>
                    `;
                }
                if (birthday) {
                    infoHtml += `
                        <div class="user-info-item">
                            <span class="user-info-icon">🎂</span>
                            <span>${birthday.date} (${birthday.age} лет)</span>
                        </div>
                    `;
                }
                if (profile.website) {
                    infoHtml += `
                        <div class="user-info-item">
                            <span class="user-info-icon">🌐</span>
                            <a href="${escapeHtml(profile.website)}" target="_blank" style="color: var(--primary);">${escapeHtml(profile.website)}</a>
                        </div>
                    `;
                }
                
                // Социальные сети
                let socialHtml = '';
                const socials = [];

if (profile.social_vk) {
    let vkUrl = profile.social_vk;
    // Если username (буквы), то ссылка на /id, если цифры, то /club или /id
    if (/^\d+$/.test(profile.social_vk)) {
        vkUrl = `id${profile.social_vk}`;
    }
    socials.push({ 
        url: `https://vk.com/${vkUrl}`, 
        icon: '📘', 
        name: 'ВКонтакте' 
    });
}
if (profile.social_tg) {
    socials.push({ 
        url: `https://t.me/${profile.social_tg.replace('@', '')}`, 
        icon: '📱', 
        name: 'Telegram' 
    });
}
if (profile.social_custom && profile.social_custom_name) {
    socials.push({ 
        url: profile.social_custom, 
        icon: '🔗', 
        name: profile.social_custom_name 
    });
}
if (profile.website) {
    socials.push({ 
        url: profile.website, 
        icon: '🌐', 
        name: 'Сайт' 
    });
}                
                if (socials.length > 0) {
                    socialHtml = `
                        <div class="social-links">
                            ${socials.map(s => `<a href="${s.url}" target="_blank" class="social-link" title="${s.name}">${s.icon}</a>`).join('')}
                        </div>
                    `;
                }
                
                // Обложка
                const bannerHtml = profile.banner ? `
                    <div class="banner-container">
                        <img class="profile-banner" src="${profile.banner}">
                    </div>
                ` : '<div class="banner-container" style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);"></div>';
                
                // Список каналов
                let channelsHtml = '';
                if (channels.length === 0) {
                    channelsHtml = '<div class="empty">📭 Нет каналов или групп</div>';
                } else {
                    channelsHtml = channels.map(ch => `
                        <div class="channel-item" onclick="window.location.href='/channel.html?id=${ch.id}'">
                            <div class="channel-avatar">${ch.type === 'channel' ? '📢' : '👥'}</div>
                            <div class="channel-info">
                                <div class="channel-name">${escapeHtml(ch.name)}</div>
                                <div class="channel-desc">${escapeHtml(ch.description || 'Нет описания')}</div>
                            </div>
                        </div>
                    `).join('');
                }
                
                container.innerHTML = `
                    ${bannerHtml}
                    <div class="profile-card">
                        <div class="profile-avatar">${avatarHtml}</div>
                        <div class="profile-name">${escapeHtml(user.username)}</div>
                        <div class="user-status">
                            <span class="status-badge">
                                ${statusEmoji} ${statusText}
                            </span>
                            ${customStatusText ? `<span class="status-text">${customStatusText}</span>` : ''}
                        </div>
                        <div class="profile-role">${roleText}</div>
                        
                        ${bioHtml}
                        ${infoHtml}
                        ${socialHtml}
                        
                        <div class="reputation-block">
                            <div class="reputation-stats">
                                <div class="reputation-points">
                                    <span class="reputation-icon">⭐</span>
                                    <span id="reputationPoints">${repData.points || 0}</span>
                                    <span class="reputation-label">репутации</span>
                                </div>
                            </div>
                            <div id="reputationHistory" class="reputation-history"></div>
                        </div>
                        
                        <div class="profile-stats">
                            <div class="stat">
                                <div class="stat-value">${channels.length}</div>
                                <div class="stat-label">каналов/групп</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${date}</div>
                                <div class="stat-label">с нами с</div>
                            </div>
                        </div>
                        
                        ${friendActionHtml}
                        ${editButtonHtml}
                    </div>
                    <div class="section-title">📢 Каналы и группы</div>
                    ${channelsHtml}
                `;
                
                // История репутации
                const historyContainer = document.getElementById('reputationHistory');
                if (repData.recent && repData.recent.length > 0) {
                    historyContainer.innerHTML = repData.recent.map(item => `
                        <div class="reputation-item">
                            <img class="reputation-avatar" src="${item.avatar || ''}" onerror="this.style.display='none'">
                            <span class="reputation-name">${escapeHtml(item.username)}</span>
                            <span class="reputation-date">${formatDate(item.created_at)}</span>
                            <span class="reputation-points-small">+${item.points}</span>
                        </div>
                    `).join('');
                } else {
                    historyContainer.innerHTML = '<div style="text-align: center; padding: 16px;">Пока никто не оценил</div>';
                }
                
                // Кнопка редактирования
                const editBtn = document.getElementById('editProfileBtn');
                if (editBtn) {
                    editBtn.onclick = () => {
                        window.location.href = '/profile-edit.html';
                    };
                }
                
            } catch (err) {
                console.error('Ошибка загрузки профиля:', err);
                document.getElementById('content').innerHTML = '<div class="empty">❌ Пользователь не найден</div>';
            }
        }
        
        // Инициализация
        async function init() {
            const res = await fetch('/api/me', { credentials: 'include' });
            if (!res.ok) {
                window.location.href = '/login.html';
                return;
            }
            currentUser = await res.json();
            
            // Подключаем WebSocket для обновления статусов
            socket = io();
            socket.emit('auth', currentUser.id);
            
            socket.on('user_status_changed', (data) => {
                if (userId && data.user_id == userId) {
                    loadProfile();
                }
            });
            
            await loadProfile();
        }
        
        init();


        // ============= ДОСТИЖЕНИЯ =============

async function loadAchievements() {
    const container = document.getElementById('achievementsGrid');
    const countSpan = document.getElementById('achievementsCount');
    if (!container) return;
    
    try {
        const res = await fetch('/api/user/achievements', { credentials: 'include' });
        const data = await res.json();
        
        if (!data.all || data.all.length === 0) {
            container.innerHTML = '<div class="empty" style="grid-column: 1/-1;">🏆 Достижений пока нет</div>';
            if (countSpan) countSpan.textContent = '0';
            return;
        }
        
        const earnedCount = data.all.filter(a => a.earned === 1).length;
        if (countSpan) countSpan.textContent = earnedCount;
        
        container.innerHTML = data.all.map(ach => `
            <div class="achievement-card ${ach.earned ? 'earned' : 'locked'}" 
                 title="${escapeHtml(ach.description)}">
                <span class="achievement-rarity rarity-${ach.rarity}">
                    ${ach.rarity === 'common' ? '●' : ach.rarity === 'rare' ? '◆' : ach.rarity === 'epic' ? '◇' : '★'}
                </span>
                <div class="achievement-icon">${ach.icon || '🏆'}</div>
                <div class="achievement-name">${escapeHtml(ach.name)}</div>
                <div class="achievement-desc">${escapeHtml(ach.description.substring(0, 30))}${ach.description.length > 30 ? '...' : ''}</div>
            </div>
        `).join('');
        
        // Если есть новые ачивки (не просмотренные) — показываем уведомление
        const newAchievements = data.earned.filter(a => a.is_viewed === 0);
        if (newAchievements.length > 0) {
            showAchievementToast(newAchievements[0]);
        }
        
    } catch (err) {
        console.error('Ошибка загрузки достижений:', err);
        if (container) container.innerHTML = '<div class="empty" style="grid-column: 1/-1;">❌ Ошибка загрузки</div>';
    }
}

function showAchievementToast(achievement) {
    const toast = document.createElement('div');
    toast.className = 'achievement-toast';
    toast.innerHTML = `
        <div class="achievement-toast-icon">${achievement.icon || '🏆'}</div>
        <div class="achievement-toast-content">
            <div class="achievement-toast-title">🎉 Новое достижение!</div>
            <div class="achievement-toast-desc">${escapeHtml(achievement.name)}</div>
        </div>
    `;
    toast.onclick = () => {
        toast.remove();
        // Прокручиваем к достижениям
        const achievementsSection = document.querySelector('.achievements-section');
        if (achievementsSection) {
            achievementsSection.scrollIntoView({ behavior: 'smooth' });
        }
    };
    document.body.appendChild(toast);
    setTimeout(() => {
        if (toast && toast.parentNode) toast.remove();
    }, 8000);
}

// Загружаем ачивки после загрузки страницы
document.addEventListener('DOMContentLoaded', () => {
    if (document.getElementById('achievementsGrid')) {
        loadAchievements();
    }
});
    </script>

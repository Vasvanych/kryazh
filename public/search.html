<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Поиск - Kryazh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --border: #e0e0e0;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --primary: #764ba2;
            --hover: #f0f0f0;
        }

        [data-theme="dark"] {
            --bg: #0f0f0f;
            --surface: #1e1e1e;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --text-secondary: #aaaaaa;
            --primary: #9b6fc4;
            --hover: #252525;
        }

        [data-theme="wild"] {
            --bg: #2d3e2b;
            --surface: #4a6e3a;
            --border: #6a8e5a;
            --text: #f5e6c4;
            --text-secondary: #d4c4a4;
            --primary: #c9a87b;
            --hover: #5a7e4a;
        }

        [data-theme="barbie"] {
            --bg: #ffd1dc;
            --surface: #fff0f3;
            --border: #ffb6c1;
            --text: #c21e56;
            --text-secondary: #e8436e;
            --primary: #ff69b4;
            --hover: #ffe4e9;
        }

        [data-theme="cyber"] {
            --bg: #0a0a0f;
            --surface: #15151f;
            --border: #2a2a3a;
            --text: #00ffff;
            --text-secondary: #66ffff;
            --primary: #ff00ff;
            --hover: #1a1a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 24px;
            text-decoration: none;
            color: var(--text);
            font-size: 14px;
        }

        .search-box {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: var(--surface);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .result-item {
            background: var(--surface);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .result-item:active {
            transform: scale(0.98);
        }

        .result-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .result-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-info {
            flex: 1;
        }

        .result-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .result-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .result-meta {
            font-size: 11px;
            color: var(--primary);
            margin-top: 4px;
        }

        .subscribe-badge {
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            border: none;
        }

        .empty {
            text-align: center;
            padding: 40px;
            background: var(--surface);
            border-radius: 16px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .result-avatar {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Назад</a>
        
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск каналов, групп, пользователей..." autofocus>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-tab="channels">📢 Каналы</button>
            <button class="tab" data-tab="groups">👥 Группы</button>
            <button class="tab" data-tab="users">👤 Пользователи</button>
        </div>
        
        <div id="results">
            <div class="empty">🔍 Введите запрос для поиска</div>
        </div>
    </div>

    <script>
        // ============= ПРИМЕНЯЕМ ТЕМУ =============
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();

        // ============= ПЕРЕМЕННЫЕ =============
        let currentTab = 'channels';
        let searchTimeout;

        // ============= ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =============
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============= ПОИСК =============
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (query.length < 2) {
                resultsDiv.innerHTML = '<div class="empty">🔍 Введите минимум 2 символа для поиска</div>';
                return;
            }
            
            resultsDiv.innerHTML = '<div class="empty">⏳ Поиск...</div>';
            
            try {
                let url;
                if (currentTab === 'users') {
                    // Поиск пользователей
                    url = `/api/users/search?q=${encodeURIComponent(query)}`;
                } else {
                    // Поиск каналов и групп
                    url = `/api/channels/search?q=${encodeURIComponent(query)}`;
                }
                
                const res = await fetch(url, { credentials: 'include' });
                let items = await res.json();
                
                // Фильтруем по выбранной вкладке
                if (currentTab === 'channels') {
                    items = items.filter(i => i.type === 'channel');
                } else if (currentTab === 'groups') {
                    items = items.filter(i => i.type === 'group');
                }
                
                if (items.length === 0) {
                    resultsDiv.innerHTML = '<div class="empty">😕 Ничего не найдено</div>';
                    return;
                }
                
                // Отображаем результаты
                resultsDiv.innerHTML = items.map(item => {
                    let avatarHtml = '';
                    if (currentTab !== 'users') {
                        avatarHtml = item.type === 'channel' ? '📢' : '👥';
                    } else {
                        avatarHtml = '👤';
                    }
                    
                    if (item.avatar) {
                        avatarHtml = `<img src="${item.avatar}">`;
                    }
                    
                    let desc = '';
                    let meta = '';
                    
                    if (currentTab !== 'users') {
                        desc = item.description || 'Нет описания';
                        meta = `👥 ${item.members_count || 0} участников`;
                        if (item.is_member) {
                            meta += ' • ✓ Вы подписаны';
                        }
                    } else {
                        desc = `ID: ${item.id}`;
                        meta = `📅 с ${new Date(item.created_at).toLocaleDateString('ru-RU')}`;
                    }
                    
                    return `
                        <div class="result-item" onclick="openItem('${currentTab}', ${item.id}, '${escapeHtml(item.name || item.username)}')">
                            <div class="result-avatar">${avatarHtml}</div>
                            <div class="result-info">
                                <div class="result-name">${escapeHtml(item.name || item.username)}</div>
                                <div class="result-desc">${escapeHtml(desc)}</div>
                                <div class="result-meta">${meta}</div>
                            </div>
                            ${currentTab !== 'users' && !item.is_member ? 
                                `<button class="subscribe-badge" onclick="event.stopPropagation(); subscribe(${item.id}, this)">🔔 Подписаться</button>` : ''}
                            ${currentTab !== 'users' && item.is_member ? 
                                `<span class="subscribe-badge" style="background: var(--text-secondary);">✓ Подписан</span>` : ''}
                        </div>
                    `;
                }).join('');
                
            } catch (err) {
                console.error('Ошибка поиска:', err);
                resultsDiv.innerHTML = '<div class="empty">❌ Ошибка поиска</div>';
            }
        }
        
        // Открыть канал/группу/пользователя
        function openItem(type, id, name) {
            if (type === 'users') {
                window.location.href = `/profile.html?id=${id}`;
            } else {
                window.location.href = `/channel.html?id=${id}`;
            }
        }
        
        // Подписаться на канал
        async function subscribe(chatId, btn) {
            try {
                const res = await fetch(`/api/channels/${chatId}/subscribe`, {
                    method: 'POST',
                    credentials: 'include'
                });
                
                if (res.ok) {
                    btn.textContent = '✓ Подписан';
                    btn.style.background = 'var(--text-secondary)';
                    btn.onclick = null;
                } else {
                    const data = await res.json();
                    alert(data.error || 'Ошибка');
                }
            } catch (err) {
                alert('Ошибка соединения');
            }
        }
        
        // ============= ОБРАБОТЧИКИ =============
        
        // Поиск при вводе текста (с задержкой)
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.oninput = () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(performSearch, 300);
            };
        }
        
        // Переключение вкладок
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                performSearch();
            };
        });
        
        // Начальный поиск (если есть текст)
        if (searchInput && searchInput.value.length >= 2) {
            performSearch();
        }
    </script>
</body>
</html>

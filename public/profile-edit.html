<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Редактирование профиля - Kryazh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --border: #e0e0e0;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --primary: #764ba2;
            --primary-dark: #5a3a7a;
            --success: #4caf50;
        }

        [data-theme="dark"] {
            --bg: #0f0f0f;
            --surface: #1e1e1e;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --text-secondary: #aaaaaa;
            --primary: #9b6fc4;
        }

        [data-theme="wild"] {
            --bg: #2d3e2b;
            --surface: #4a6e3a;
            --border: #6a8e5a;
            --text: #f5e6c4;
            --text-secondary: #d4c4a4;
            --primary: #c9a87b;
        }

        [data-theme="barbie"] {
            --bg: #ffd1dc;
            --surface: #fff0f3;
            --border: #ffb6c1;
            --text: #c21e56;
            --text-secondary: #e8436e;
            --primary: #ff69b4;
        }

        [data-theme="cyber"] {
            --bg: #0a0a0f;
            --surface: #15151f;
            --border: #2a2a3a;
            --text: #00ffff;
            --text-secondary: #66ffff;
            --primary: #ff00ff;
        }

        [data-theme="ПАША"] {
            --bg: #edeef0;
            --surface: #ffffff;
            --border: #d3d9de;
            --text: #2c3e50;
            --text-secondary: #6c7a89;
            --primary: #5181b8;
        }

        [data-theme="newhorizons"] {
            --bg: #9fd3c7;
            --surface: #fffef7;
            --border: #e2dcc7;
            --text: #5b6e4a;
            --text-secondary: #8b9a6e;
            --primary: #f7b05e;
        }

        [data-theme="digitalcircus"] {
            --bg: #0f0a1a;
            --surface: #1a0f2e;
            --border: #ff3366;
            --text: #ffffff;
            --text-secondary: #ffcc33;
            --primary: #ff3366;
            --primary-dark: #cc0044;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text);
            font-size: 14px;
        }
        
        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .card h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .hint {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        .status-buttons {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        
        .status-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        
        .status-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .banner-preview {
            width: 100%;
            height: 150px;
            background: var(--border);
            border-radius: 16px;
            margin-bottom: 12px;
            object-fit: cover;
            display: none;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background: var(--primary-dark);
        }
        
        .social-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .social-icon {
            font-size: 20px;
            min-width: 36px;
            text-align: center;
        }
        
        .success-msg {
            background: var(--success);
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/profile.html" class="back-btn">← Назад к профилю</a>
        
        <div id="successMsg" class="success-msg">✅ Профиль обновлён!</div>
        
        <!-- Статус -->
        <div class="card">
            <h3>😊 Мой статус</h3>
            <div class="form-group">
                <label>Статус</label>
                <div class="status-buttons" id="statusButtons">
                    <button class="status-btn" data-status="online">🟢 Онлайн</button>
                    <button class="status-btn" data-status="away">🌙 Отошёл</button>
                    <button class="status-btn" data-status="busy">🔴 Не беспокоить</button>
                </div>
            </div>
            <div class="form-group">
                <label>Текст статуса (необязательно)</label>
                <input type="text" id="statusText" placeholder="Например: работаю, сплю, в спортзале...">
            </div>
        </div>
        
        <!-- Обложка -->
        <div class="card">
            <h3>🖼️ Обложка профиля</h3>
            <img id="bannerPreview" class="banner-preview">
            <button id="uploadBannerBtn" class="btn" style="background: var(--text-secondary);">📷 Загрузить обложку</button>
            <input type="file" id="bannerInput" accept="image/*" style="display: none;">
        </div>
        
        <!-- О себе -->
        <div class="card">
            <h3>📝 О себе</h3>
            <div class="form-group">
                <label>Bio</label>
                <textarea id="bio" placeholder="Расскажите о себе..."></textarea>
            </div>
            <div class="form-group">
                <label>Город</label>
                <input type="text" id="city" placeholder="Москва, Санкт-Петербург...">
            </div>
            <div class="form-group">
                <label>Дата рождения</label>
                <input type="date" id="birthday">
            </div>
        </div>
        
        <!-- Социальные сети -->
        <div class="card">
            <h3>🔗 Социальные сети</h3>
            <div class="form-group">
                <label>Сайт / Блог</label>
                <input type="url" id="website" placeholder="https://...">
            </div>
            <div class="form-group">
                <div class="social-inputs">
                    <span class="social-icon">📘</span>
                    <input type="text" id="vk" placeholder="ВКонтакте (ID или username)">
                </div>
                <div class="hint">Пример: id123456789 или durov</div>
            </div>
            <div class="form-group">
                <div class="social-inputs">
                    <span class="social-icon">📱</span>
                    <input type="text" id="tg" placeholder="Telegram (username)">
                </div>
                <div class="hint">Без @, только username</div>
            </div>
            <div class="form-group">
                <div class="social-inputs">
                    <span class="social-icon">🔗</span>
                    <input type="text" id="customUrl" placeholder="Ссылка на другую соцсеть">
                </div>
                <div class="form-group" style="margin-top: 8px;">
                    <input type="text" id="customName" placeholder="Название (YouTube, Discord, Twitch...)">
                </div>
            </div>
        </div>
        
        <button id="saveBtn" class="btn">💾 Сохранить изменения</button>
    </div>
    
    <script>
        // Применяем тему
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        let currentUser = null;
        
        async function loadProfile() {
            try {
                const res = await fetch('/api/me', { credentials: 'include' });
                if (!res.ok) { 
                    window.location.href = '/login.html'; 
                    return; 
                }
                currentUser = await res.json();
                
                // Загружаем полный профиль
                const profileRes = await fetch(`/api/users/${currentUser.id}/profile`, { credentials: 'include' });
                if (!profileRes.ok) {
                    console.error('Ошибка загрузки профиля:', profileRes.status);
                    return;
                }
                const profile = await profileRes.json();
                
                // Статус
                const statusBtns = document.querySelectorAll('.status-btn');
                if (statusBtns.length) {
                    statusBtns.forEach(btn => {
                        if (btn.dataset.status === profile.status_type) {
                            btn.classList.add('active');
                        }
                    });
                }
                
                const statusTextInput = document.getElementById('statusText');
                if (statusTextInput) statusTextInput.value = profile.status_text || '';
                
                // Обложка
                if (profile.banner) {
                    const bannerImg = document.getElementById('bannerPreview');
                    if (bannerImg) {
                        bannerImg.src = profile.banner;
                        bannerImg.style.display = 'block';
                    }
                }
                
                // О себе
                const bioInput = document.getElementById('bio');
                if (bioInput) bioInput.value = profile.bio || '';
                
                const cityInput = document.getElementById('city');
                if (cityInput) cityInput.value = profile.city || '';
                
                const birthdayInput = document.getElementById('birthday');
                if (birthdayInput) birthdayInput.value = profile.birthday || '';
                
                // Соцсети
                const websiteInput = document.getElementById('website');
                if (websiteInput) websiteInput.value = profile.website || '';
                
                const vkInput = document.getElementById('vk');
                if (vkInput) vkInput.value = profile.social_vk || '';
                
                const tgInput = document.getElementById('tg');
                if (tgInput) tgInput.value = profile.social_tg || '';
                
                const customUrlInput = document.getElementById('customUrl');
                if (customUrlInput) customUrlInput.value = profile.social_custom || '';
                
                const customNameInput = document.getElementById('customName');
                if (customNameInput) customNameInput.value = profile.social_custom_name || '';
                
            } catch (err) {
                console.error('Ошибка загрузки профиля:', err);
            }
        }
        
        // Выбор статуса
        const statusBtns = document.querySelectorAll('.status-btn');
        if (statusBtns.length) {
            statusBtns.forEach(btn => {
                btn.onclick = () => {
                    statusBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                };
            });
        }
        
        // Загрузка обложки
        const uploadBannerBtn = document.getElementById('uploadBannerBtn');
        const bannerInput = document.getElementById('bannerInput');
        const bannerPreview = document.getElementById('bannerPreview');
        
        if (uploadBannerBtn) {
            uploadBannerBtn.onclick = () => {
                if (bannerInput) bannerInput.click();
            };
        }
        
        if (bannerInput) {
            bannerInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const formData = new FormData();
                formData.append('banner', file);
                
                try {
                    const res = await fetch('/api/users/banner', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        if (bannerPreview) {
                            bannerPreview.src = data.bannerUrl;
                            bannerPreview.style.display = 'block';
                        }
                        alert('✅ Обложка обновлена');
                    } else {
                        alert('❌ Ошибка загрузки');
                    }
                } catch (err) {
                    console.error(err);
                    alert('Ошибка соединения');
                }
            };
        }
        
        // Сохранение всех изменений
        const saveBtn = document.getElementById('saveBtn');
        if (saveBtn) {
            saveBtn.onclick = async () => {
                // Статус
                const activeStatusBtn = document.querySelector('.status-btn.active');
                const status_type = activeStatusBtn ? activeStatusBtn.dataset.status : 'online';
                const status_text = document.getElementById('statusText')?.value || '';
                
                try {
                    // Обновляем статус
                    await fetch('/api/users/status', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status_type, status_text })
                    });
                    
                    // Обновляем профиль
                    const bio = document.getElementById('bio')?.value || '';
                    const city = document.getElementById('city')?.value || '';
                    const birthday = document.getElementById('birthday')?.value || '';
                    const website = document.getElementById('website')?.value || '';
                    const social_vk = document.getElementById('vk')?.value || '';
                    const social_tg = document.getElementById('tg')?.value || '';
                    const social_custom = document.getElementById('customUrl')?.value || '';
                    const social_custom_name = document.getElementById('customName')?.value || '';
                    
                    const profileRes = await fetch('/api/users/profile', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            bio, city, birthday, website,
                            social_vk, social_tg, social_custom, social_custom_name
                        })
                    });
                    
                    if (profileRes.ok) {
                        const successMsg = document.getElementById('successMsg');
                        if (successMsg) {
                            successMsg.style.display = 'block';
                            setTimeout(() => {
                                successMsg.style.display = 'none';
                                window.location.href = '/profile.html';
                            }, 1500);
                        } else {
                            window.location.href = '/profile.html';
                        }
                    } else {
                        const err = await profileRes.json();
                        alert('❌ Ошибка: ' + (err.error || 'Не удалось сохранить'));
                    }
                } catch (err) {
                    console.error('Ошибка сохранения:', err);
                    alert('❌ Ошибка соединения');
                }
            };
        }
        
        loadProfile();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#764ba2">
    <title>Лента новостей - Kryazh</title>
    <style>
        /* ============= МОДАЛЬНОЕ ОКНО КОММЕНТАРИЕВ ============= */
        .comments-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .comments-modal.active {
            display: flex;
        }

        .comments-modal-content {
            background: var(--surface);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .comments-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .comments-modal-header h3 {
            font-size: 18px;
        }

        .comments-modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            min-height: 200px;
            max-height: 400px;
        }

        .comment-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
        }

        .comment-author {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .comment-text {
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }

        .comment-date {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .comment-delete {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 12px;
            padding: 0 4px;
        }

        .comments-input-area {
            display: flex;
            gap: 10px;
            padding: 16px;
            border-top: 1px solid var(--border);
            align-items: flex-start;
        }

        .comments-user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        #commentInput {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }

        .comments-send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }

        .empty-comments {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .comments-count {
            margin-left: 2px;
        }

        /* ============= ОСНОВНЫЕ СТИЛИ ============= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --border: #e0e0e0;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --primary: #764ba2;
            --primary-dark: #6a3d96;
            --hover: #f0f0f0;
            --shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg: #0f0f0f;
            --surface: #1e1e1e;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --text-secondary: #aaaaaa;
            --primary: #9b6fc4;
            --hover: #252525;
            --shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        [data-theme="wild"] {
            --bg: #2d3e2b;
            --surface: #4a6e3a;
            --border: #6a8e5a;
            --text: #f5e6c4;
            --text-secondary: #d4c4a4;
            --primary: #c9a87b;
            --hover: #5a7e4a;
        }

        [data-theme="barbie"] {
            --bg: #ffd1dc;
            --surface: #fff0f3;
            --border: #ffb6c1;
            --text: #c21e56;
            --text-secondary: #e8436e;
            --primary: #ff69b4;
            --hover: #ffe4e9;
        }

        [data-theme="cyber"] {
            --bg: #0a0a0f;
            --surface: #15151f;
            --border: #2a2a3a;
            --text: #00ffff;
            --text-secondary: #66ffff;
            --primary: #ff00ff;
            --hover: #1a1a2a;
        }

        [data-theme="ПАША"] {
            --bg: #edeef0;
            --surface: #ffffff;
            --border: #d3d9de;
            --text: #2c3e50;
            --text-secondary: #6c7a89;
            --primary: #5181b8;
            --hover: #f0f2f5;
        }

        [data-theme="newhorizons"] {
            --bg: #9fd3c7;
            --surface: #fffef7;
            --border: #e2dcc7;
            --text: #5b6e4a;
            --text-secondary: #8b9a6e;
            --primary: #f7b05e;
            --hover: #fff5e6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .header-btn:active {
            transform: scale(0.96);
        }

        /* Карточка поста */
        .post {
            background: var(--surface);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 14px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .post:active {
            transform: scale(0.99);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .channel-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }

        .channel-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-info {
            flex: 1;
        }

        .channel-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .post-date {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .post-content {
            font-size: 14px;
            line-height: 1.5;
            margin: 12px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .post-media {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        /* Кнопки действий */
        .post-actions {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .like-btn {
            background: none;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .like-btn:hover {
            background: var(--hover);
        }

        .like-btn.liked {
            color: #e74c3c;
        }

        .comment-btn {
            background: none;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }

        .comment-btn:hover {
            background: var(--hover);
        }

        /* Состояния */
        .loading, .empty {
            text-align: center;
            padding: 60px 20px;
            background: var(--surface);
            border-radius: 16px;
            color: var(--text-secondary);
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .load-more {
            text-align: center;
            margin: 16px 0;
        }

        .load-more button {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            transition: all 0.2s;
        }

        /* Скелетон загрузки */
        .skeleton {
            background: var(--surface);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 14px;
        }

        .skeleton-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .skeleton-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(90deg, var(--border) 25%, var(--hover) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1s infinite;
        }

        .skeleton-line {
            height: 12px;
            background: linear-gradient(90deg, var(--border) 25%, var(--hover) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1s infinite;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .skeleton-line.short {
            width: 60%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 768px) {
            body {
                padding: 8px;
            }
            .channel-avatar {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .post-content {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .channel-avatar {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📰 Лента</h1>
            <div class="header-actions">
                <button class="header-btn" id="refreshBtn">🔄</button>
                <button class="header-btn" onclick="window.location.href='/'">← Назад</button>
            </div>
        </div>
        
        <div id="posts"></div>
    </div>

    <!-- Модальное окно комментариев -->
    <div id="commentsModal" class="comments-modal">
        <div class="comments-modal-content">
            <div class="comments-modal-header">
                <h3>💬 Комментарии</h3>
                <button class="comments-modal-close" onclick="closeCommentsModal()">✕</button>
            </div>
            <div class="comments-list" id="commentsList">
                <div class="loading">⏳ Загрузка...</div>
            </div>
            <div class="comments-input-area">
                <img class="comments-user-avatar" id="commentsUserAvatar" src="">
                <textarea id="commentInput" placeholder="Напишите комментарий..." rows="2"></textarea>
                <button id="sendCommentBtn" class="comments-send-btn">📨 Отправить</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Применяем тему
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();

        let offset = 0;
        const limit = 20;
        let loading = false;
        let hasMore = true;
        let currentUser = null;
        let socket = null;
        let currentPostId = null;

        // Защита от XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Форматирование даты
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000 / 60);
            
            if (diff < 1) return 'только что';
            if (diff < 60) return `${diff} мин назад`;
            if (diff < 1440) return `${Math.floor(diff / 60)} ч назад`;
            if (diff < 10080) return `${Math.floor(diff / 1440)} дн назад`;
            return date.toLocaleDateString('ru-RU', {
                day: 'numeric',
                month: 'short'
            });
        }

        // Лайк поста
        async function toggleLike(postId, btnElement) {
            try {
                const res = await fetch(`/api/posts/${postId}/like`, {
                    method: 'POST',
                    credentials: 'include'
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    alert(err.error || 'Ошибка');
                    return;
                }
                
                const data = await res.json();
                
                const likesSpan = btnElement.querySelector('.likes-count');
                if (likesSpan) {
                    likesSpan.textContent = data.likesCount;
                }
                
                if (data.userLiked) {
                    btnElement.classList.add('liked');
                } else {
                    btnElement.classList.remove('liked');
                }
                
            } catch (err) {
                console.error('Ошибка:', err);
                alert('Не удалось поставить лайк');
            }
        }

        // Отображение поста
        function renderPost(post) {
            const defaultAvatar = post.channel_avatar || '';
            const avatarHtml = defaultAvatar 
                ? `<img src="${defaultAvatar}" class="channel-avatar" style="object-fit:cover;">`
                : `<div class="channel-avatar">📢</div>`;
            
            const isLiked = post.user_liked === 1 || post.user_liked === true;
            const likesCount = post.likes_count || 0;
            
            return `
                <div class="post" data-post-id="${post.id}">
                    <div class="post-header" onclick="window.location.href='/channel.html?id=${post.source_id}'">
                        ${avatarHtml}
                        <div class="post-info">
                            <div class="channel-name">${escapeHtml(post.source_name)}</div>
                            <div class="post-date">${formatDate(post.created_at)}</div>
                        </div>
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    ${post.media_url ? `<img class="post-media" src="${post.media_url}" onclick="event.stopPropagation(); window.open('${post.media_url}', '_blank')">` : ''}
                    <div class="post-actions">
                        <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike(${post.id}, this)">
                            ❤️ <span class="likes-count">${likesCount}</span>
                        </button>
                        <button class="comment-btn" onclick="event.stopPropagation(); showComments(${post.id})">
                            💬 <span class="comments-count">${post.comments_count || 0}</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // Скелетон загрузки
        function showSkeleton() {
            const container = document.getElementById('posts');
            if (offset === 0) {
                container.innerHTML = `
                    <div class="skeleton">
                        <div class="skeleton-header">
                            <div class="skeleton-avatar"></div>
                            <div style="flex:1">
                                <div class="skeleton-line" style="width:60%"></div>
                                <div class="skeleton-line short"></div>
                            </div>
                        </div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line" style="width:80%"></div>
                    </div>
                    <div class="skeleton">
                        <div class="skeleton-header">
                            <div class="skeleton-avatar"></div>
                            <div style="flex:1">
                                <div class="skeleton-line" style="width:50%"></div>
                                <div class="skeleton-line short"></div>
                            </div>
                        </div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line" style="width:70%"></div>
                    </div>
                `;
            }
        }

        // Загрузка постов
        async function loadPosts() {
            if (loading || !hasMore) return;
            
            loading = true;
            const container = document.getElementById('posts');
            
            if (offset === 0) {
                showSkeleton();
            }
            
            try {
                const res = await fetch(`/api/feed?limit=${limit}&offset=${offset}`, {
                    credentials: 'include'
                });
                
                if (res.status === 401) {
                    window.location.href = '/login.html';
                    return;
                }
                
                const posts = await res.json();
                
                if (offset === 0) {
                    container.innerHTML = '';
                }
                
                if (posts.length === 0 && offset === 0) {
                    container.innerHTML = `
                        <div class="empty">
                            📭 Пока нет постов<br><br>
                            Подпишитесь на каналы, чтобы видеть их посты в ленте
                        </div>
                    `;
                    hasMore = false;
                } else if (posts.length > 0) {
                    posts.forEach(post => {
                        container.insertAdjacentHTML('beforeend', renderPost(post));
                    });
                    
                    offset += posts.length;
                    hasMore = posts.length === limit;
                    
                    if (hasMore) {
                        let loadBtn = document.querySelector('.load-more');
                        if (!loadBtn) {
                            loadBtn = document.createElement('div');
                            loadBtn.className = 'load-more';
                            loadBtn.innerHTML = '<button onclick="loadPosts()">📖 Загрузить ещё</button>';
                            container.appendChild(loadBtn);
                        }
                    } else {
                        const loadBtn = document.querySelector('.load-more');
                        if (loadBtn) loadBtn.remove();
                    }
                } else {
                    hasMore = false;
                    const loadBtn = document.querySelector('.load-more');
                    if (loadBtn) loadBtn.remove();
                }
                
            } catch (err) {
                console.error('Ошибка загрузки:', err);
                if (offset === 0) {
                    container.innerHTML = `
                        <div class="empty">
                            ❌ Ошибка загрузки<br><br>
                            <button onclick="location.reload()" style="margin-top: 12px; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 24px; cursor: pointer;">Повторить</button>
                        </div>
                    `;
                }
            } finally {
                loading = false;
            }
        }

        // Бесконечная прокрутка
        let scrollTimeout;
        window.addEventListener('scroll', () => {
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                const scrollPosition = window.scrollY + window.innerHeight;
                const pageHeight = document.documentElement.scrollHeight;
                
                if (scrollPosition >= pageHeight - 300 && !loading && hasMore) {
                    loadPosts();
                }
            }, 100);
        });

        // ============= КОММЕНТАРИИ =============

        // Открыть модальное окно с комментариями
        async function showComments(postId) {
            currentPostId = postId;
            const modal = document.getElementById('commentsModal');
            const commentsList = document.getElementById('commentsList');
            
            modal.classList.add('active');
            commentsList.innerHTML = '<div class="loading">⏳ Загрузка комментариев...</div>';
            
            try {
                const res = await fetch(`/api/posts/${postId}/comments`, { credentials: 'include' });
                const data = await res.json();
                
                if (!data.comments || data.comments.length === 0) {
                    commentsList.innerHTML = '<div class="empty-comments">💬 Нет комментариев. Будьте первым!</div>';
                } else {
                    commentsList.innerHTML = data.comments.map(comment => `
                        <div class="comment-item" data-comment-id="${comment.id}">
                            <img class="comment-avatar" src="${comment.avatar || ''}" onerror="this.style.display='none'">
                            <div class="comment-content">
                                <div class="comment-author">${escapeHtml(comment.username)}</div>
                                <div class="comment-text">${escapeHtml(comment.content)}</div>
                                <div class="comment-date">${formatDate(comment.created_at)}</div>
                            </div>
                            ${(comment.user_id === currentUser?.id || currentUser?.role === 'admin') ? 
                                `<button class="comment-delete" onclick="deleteComment(${comment.id}, ${postId})">🗑️</button>` : ''}
                        </div>
                    `).join('');
                }
                
            } catch (err) {
                console.error('Ошибка загрузки комментариев:', err);
                commentsList.innerHTML = '<div class="empty-comments">❌ Ошибка загрузки</div>';
            }
        }

        // Закрыть модальное окно
        function closeCommentsModal() {
            document.getElementById('commentsModal').classList.remove('active');
            currentPostId = null;
            document.getElementById('commentInput').value = '';
        }

        // Отправить комментарий
        async function sendComment() {
            if (!currentPostId) return;
            
            const content = document.getElementById('commentInput').value.trim();
            if (!content) {
                alert('Введите комментарий');
                return;
            }
            
            try {
                const res = await fetch(`/api/posts/${currentPostId}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ content })
                });
                
                if (res.ok) {
                    document.getElementById('commentInput').value = '';
                    showComments(currentPostId);
                    loadPosts(); // Обновляем счётчик комментариев в ленте
                } else {
                    const err = await res.json();
                    alert(err.error || 'Ошибка');
                }
            } catch (err) {
                console.error('Ошибка:', err);
                alert('Ошибка соединения');
            }
        }

        // Удалить комментарий
        async function deleteComment(commentId, postId) {
            if (!confirm('Удалить комментарий?')) return;
            
            try {
                const res = await fetch(`/api/comments/${commentId}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                
                if (res.ok) {
                    showComments(postId);
                    loadPosts();
                } else {
                    alert('Ошибка удаления');
                }
            } catch (err) {
                alert('Ошибка соединения');
            }
        }

        // ============= ИНИЦИАЛИЗАЦИЯ =============
        async function init() {
            try {
                const res = await fetch('/api/me', { credentials: 'include' });
                if (!res.ok) {
                    window.location.href = '/login.html';
                    return;
                }
                currentUser = await res.json();
                
                // Кнопка обновления
                const refreshBtn = document.getElementById('refreshBtn');
                if (refreshBtn) {
                    refreshBtn.onclick = () => {
                        offset = 0;
                        hasMore = true;
                        loadPosts();
                    };
                }
                
                // Аватар пользователя для комментариев
                const userAvatar = document.getElementById('commentsUserAvatar');
                if (userAvatar && currentUser.avatar) {
                    userAvatar.src = currentUser.avatar;
                }
                
                // Кнопка отправки комментария
                const sendCommentBtn = document.getElementById('sendCommentBtn');
                if (sendCommentBtn) {
                    sendCommentBtn.onclick = sendComment;
                    console.log('✅ Кнопка отправки комментария привязана');
                }
                
                // Закрытие модального окна по клику вне
                const commentsModal = document.getElementById('commentsModal');
                if (commentsModal) {
                    commentsModal.onclick = (e) => {
                        if (e.target === commentsModal) closeCommentsModal();
                    };
                }
                
                // Подключаем WebSocket
                socket = io();
                socket.emit('auth', currentUser.id);
                
                // Слушаем новые посты
                socket.on('new_post', () => {
                    offset = 0;
                    hasMore = true;
                    loadPosts();
                });
                
                // Загружаем посты
                await loadPosts();
                
            } catch (err) {
                console.error('Ошибка инициализации:', err);
            }
        }
        
        // Запускаем
        init();
    </script>
</body>
</html>

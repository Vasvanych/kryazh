    --msg-received-text: #d4e8d4;

}
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: var(--hover);
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        /* Сортировка */
        .sort-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .sort-btn {
            background: none;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .sort-btn.active {
            background: var(--primary);
            color: white;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Карточка поста */
        .post {
            background: var(--surface);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 14px;
            box-shadow: var(--shadow);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .channel-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }

        .channel-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-info {
            flex: 1;
        }

        .channel-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .post-date {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .post-stats {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .post-content {
            font-size: 14px;
            line-height: 1.5;
            margin: 12px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .post-media {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        /* Кнопки действий */
        .post-actions {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .like-btn {
            background: none;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }

        .like-btn:hover {
            background: var(--hover);
        }

        .like-btn.liked {
            color: #e74c3c;
        }

        .comment-btn {
            background: none;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }

        .comment-btn:hover {
            background: var(--hover);
        }

        /* Состояния */
        .loading, .empty {
            text-align: center;
            padding: 60px 20px;
            background: var(--surface);
            border-radius: 16px;
            color: var(--text-secondary);
        }

        .load-more {
            text-align: center;
            margin: 16px 0;
        }

        .load-more button {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Скелетон */
        .skeleton {
            background: var(--surface);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 14px;
        }

        .skeleton-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .skeleton-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(90deg, var(--border) 25%, var(--hover) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1s infinite;
        }

        .skeleton-line {
            height: 12px;
            background: linear-gradient(90deg, var(--border) 25%, var(--hover) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1s infinite;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .skeleton-line.short {
            width: 60%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 768px) {
            .channel-avatar {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📰 Лента</h1>
            <div class="tabs">
                <button class="tab active" data-tab="feed">📰 Моя лента</button>
                <button class="tab" data-tab="popular">🔥 Популярное</button>
            </div>
            <div class="sort-bar" id="sortBar" style="display: none;">
                <button class="sort-btn active" data-sort="likes">❤️ По лайкам</button>
                <button class="sort-btn" data-sort="comments">💬 По комментариям</button>
                <button class="sort-btn" data-sort="new">🆕 По дате</button>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="refreshBtn">🔄</button>
                <button class="header-btn" onclick="window.location.href='/'">← Назад</button>
            </div>
        </div>
        
        <div id="posts"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Применяем тему
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();

        let offset = 0;
        const limit = 20;
        let loading = false;
        let hasMore = true;
        let currentUser = null;
        let socket = null;
        let currentTab = 'feed';      // 'feed' или 'popular'
        let currentSort = 'likes';     // 'likes', 'comments', 'new'

        // Защита от XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Форматирование даты
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000 / 60);
            
            if (diff < 1) return 'только что';
            if (diff < 60) return `${diff} мин назад`;
            if (diff < 1440) return `${Math.floor(diff / 60)} ч назад`;
            if (diff < 10080) return `${Math.floor(diff / 1440)} дн назад`;
            return date.toLocaleDateString('ru-RU', {
                day: 'numeric',
                month: 'short'
            });
        }

        // Лайк поста
        async function toggleLike(postId, btnElement) {
            try {
                const res = await fetch(`/api/posts/${postId}/like`, {
                    method: 'POST',
                    credentials: 'include'
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    alert(err.error || 'Ошибка');
                    return;
                }
                
                const data = await res.json();
                const likesSpan = btnElement.querySelector('.likes-count');
                if (likesSpan) likesSpan.textContent = data.likesCount;
                
                if (data.userLiked) {
                    btnElement.classList.add('liked');
                } else {
                    btnElement.classList.remove('liked');
                }
            } catch (err) {
                console.error(err);
                alert('Не удалось поставить лайк');
            }
        }

        // Отображение поста
        function renderPost(post) {
            const defaultAvatar = post.source_avatar || '';
            const avatarHtml = defaultAvatar 
                ? `<img src="${defaultAvatar}" class="channel-avatar" style="object-fit:cover;">`
                : `<div class="channel-avatar">📢</div>`;
            
            const isLiked = post.user_liked === 1 || post.user_liked === true;
            const likesCount = post.likes_count || 0;
            const commentsCount = post.comments_count || 0;
            
            return `
                <div class="post" data-post-id="${post.id}">
                    <div class="post-header" onclick="window.location.href='/channel.html?id=${post.source_id}'">
                        ${avatarHtml}
                        <div class="post-info">
                            <div class="channel-name">${escapeHtml(post.source_name)}</div>
                            <div class="post-date">${formatDate(post.created_at)}</div>
                            ${currentTab === 'popular' ? `<div class="post-stats">❤️ ${likesCount} лайков • 💬 ${commentsCount} комментариев</div>` : ''}
                        </div>
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    ${post.media_url ? `<img class="post-media" src="${post.media_url}" onclick="event.stopPropagation(); window.open('${post.media_url}', '_blank')">` : ''}
                    <div class="post-actions">
                        <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike(${post.id}, this)">
                            ❤️ <span class="likes-count">${likesCount}</span>
                        </button>
                        <button class="comment-btn" onclick="event.stopPropagation(); showComments(${post.id})">
                            💬 <span class="comments-count">${commentsCount}</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // Показываем скелетон
        function showSkeleton() {
            const container = document.getElementById('posts');
            if (offset === 0) {
                container.innerHTML = `
                    <div class="skeleton">
                        <div class="skeleton-header">
                            <div class="skeleton-avatar"></div>
                            <div style="flex:1">
                                <div class="skeleton-line" style="width:60%"></div>
                                <div class="skeleton-line short"></div>
                            </div>
                        </div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line" style="width:80%"></div>
                    </div>
                    <div class="skeleton">
                        <div class="skeleton-header">
                            <div class="skeleton-avatar"></div>
                            <div style="flex:1">
                                <div class="skeleton-line" style="width:50%"></div>
                                <div class="skeleton-line short"></div>
                            </div>
                        </div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line" style="width:70%"></div>
                    </div>
                `;
            }
        }

        // Загрузка постов
        async function loadPosts() {
            if (loading || !hasMore) return;
            
            loading = true;
            const container = document.getElementById('posts');
            if (offset === 0) showSkeleton();
            
            try {
                let url;
                if (currentTab === 'feed') {
                    url = `/api/feed?limit=${limit}&offset=${offset}`;
                } else {
                    url = `/api/feed/popular?limit=${limit}&offset=${offset}&sort=${currentSort}`;
                }
                
                const res = await fetch(url, { credentials: 'include' });
                if (res.status === 401) {
                    window.location.href = '/login.html';
                    return;
                }
                
                const posts = await res.json();
                
                if (offset === 0) container.innerHTML = '';
                
                if (posts.length === 0 && offset === 0) {
                    if (currentTab === 'feed') {
                        container.innerHTML = '<div class="empty">📭 Пока нет постов<br><br>Подпишитесь на каналы, чтобы видеть их посты в ленте</div>';
                    } else {
                        container.innerHTML = '<div class="empty">🔥 Популярных постов пока нет<br><br>Ставьте лайки, чтобы продвигать посты!</div>';
                    }
                    hasMore = false;
                } else if (posts.length > 0) {
                    posts.forEach(post => {
                        container.insertAdjacentHTML('beforeend', renderPost(post));
                    });
                    
                    offset += posts.length;
                    hasMore = posts.length === limit;
                    
                    if (hasMore && !document.querySelector('.load-more')) {
                        const loadBtn = document.createElement('div');
                        loadBtn.className = 'load-more';
                        loadBtn.innerHTML = '<button onclick="loadPosts()">📖 Загрузить ещё</button>';
                        container.appendChild(loadBtn);
                    } else if (!hasMore) {
                        document.querySelector('.load-more')?.remove();
                    }
                } else {
                    hasMore = false;
                    document.querySelector('.load-more')?.remove();
                }
            } catch (err) {
                console.error('Ошибка загрузки:', err);
                if (offset === 0) {
                    container.innerHTML = '<div class="empty">❌ Ошибка загрузки<br><button onclick="location.reload()" style="margin-top: 12px; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 24px; cursor: pointer;">Повторить</button></div>';
                }
            } finally {
                loading = false;
            }
        }

        // Сброс и перезагрузка
        function resetAndLoad() {
            offset = 0;
            hasMore = true;
            loading = false;
            loadPosts();
        }

        // Бесконечная прокрутка
        let scrollTimeout;
        window.addEventListener('scroll', () => {
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                const scrollPosition = window.scrollY + window.innerHeight;
                const pageHeight = document.documentElement.scrollHeight;
                if (scrollPosition >= pageHeight - 300 && !loading && hasMore) {
                    loadPosts();
                }
            }, 100);
        });

        // ============= КОММЕНТАРИИ =============
      

        // ============= ИНИЦИАЛИЗАЦИЯ =============
        async function init() {
            try {
                const res = await fetch('/api/me', { credentials: 'include' });
                if (!res.ok) {
                    window.location.href = '/login.html';
                    return;
                }
                currentUser = await res.json();

                // Устанавливаем аватар пользователя в форму комментариев
const userAvatar = document.getElementById('commentsUserAvatar');
if (userAvatar && currentUser.avatar) {
    userAvatar.src = currentUser.avatar;
}
                
                // Кнопка обновления
                document.getElementById('refreshBtn').onclick = resetAndLoad;
                
                // Переключение вкладок
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.onclick = () => {
                        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        currentTab = tab.dataset.tab;
                        
                        // Показываем/скрываем сортировку для популярного
                        const sortBar = document.getElementById('sortBar');
                        if (currentTab === 'popular') {
                            sortBar.style.display = 'flex';
                        } else {
                            sortBar.style.display = 'none';
                        }
                        
                        resetAndLoad();
                    };
                });
                
                // Сортировка
                document.querySelectorAll('.sort-btn').forEach(btn => {
                    btn.onclick = () => {
                        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        currentSort = btn.dataset.sort;
                        resetAndLoad();
                    };
                });
                
                // Подключаем WebSocket
                socket = io();
                socket.emit('auth', currentUser.id);
                
                // Слушаем новые посты (только для моей ленты)
                socket.on('new_post', () => {
                    if (currentTab === 'feed') {
                        resetAndLoad();
                    }
                });
                
                // Загружаем посты
                await loadPosts();
                
            } catch (err) {
                console.error('Ошибка инициализации:', err);
            }
        }
        
        init();
    </script>
    <!-- Модальное окно комментариев -->
<div id="commentsModal" class="comments-modal">
    <div class="comments-modal-content">
        <div class="comments-modal-header">
            <h3>💬 Комментарии</h3>
            <button class="comments-modal-close" onclick="closeCommentsModal()">✕</button>
        </div>
        <div class="comments-list" id="commentsList">
            <div class="loading">⏳ Загрузка...</div>

        <div class="comments-input-area">

</div>

<script>
    let currentPostId = null;

    async function showComments(postId) {
        currentPostId = postId;
        const modal = document.getElementById('commentsModal');
        const commentsList = document.getElementById('commentsList');
        
        modal.classList.add('active');
        commentsList.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
        
        try {
            const res = await fetch(`/api/posts/${postId}/comments`, { credentials: 'include' });
            const data = await res.json();
            
            if (!data.comments || data.comments.length === 0) {
                commentsList.innerHTML = '<div style="text-align:center; padding:40px;">💬 Нет комментариев. Будьте первым!</div>';
            } else {
                commentsList.innerHTML = data.comments.map(c => `
                    <div class="comment-item">
                        <img class="comment-avatar" src="${c.avatar || ''}" onerror="this.style.display='none'">
                        <div class="comment-content">
                            <div class="comment-author">${escapeHtml(c.username)}</div>
                            <div class="comment-text">${escapeHtml(c.content)}</div>
                            <div class="comment-date">${formatDate(c.created_at)}</div>
                        </div>
                        ${(c.user_id === currentUser?.id || currentUser?.role === 'admin') ? 
                            `<button class="comment-delete" onclick="deleteComment(${c.id})">🗑️</button>` : ''}
                    </div>
                `).join('');
            }
        } catch (err) {
            console.error(err);
            commentsList.innerHTML = '<div style="text-align:center; padding:40px;">❌ Ошибка загрузки</div>';
        }
    }

    function closeCommentsModal() {
        document.getElementById('commentsModal').classList.remove('active');
        currentPostId = null;
        document.getElementById('commentInput').value = '';
    }

    async function sendComment() {
        if (!currentPostId) return;
        const content = document.getElementById('commentInput').value.trim();
        if (!content) {
            alert('Введите комментарий');
            return;
        }
        
        try {
            const res = await fetch(`/api/posts/${currentPostId}/comments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ content })
            });
            
            if (res.ok) {
                document.getElementById('commentInput').value = '';
                showComments(currentPostId);
                // Обновляем счётчик в ленте
                location.reload();
            } else {
                const err = await res.json();
                alert(err.error || 'Ошибка');
            }
        } catch (err) {
            alert('Ошибка соединения');
        }
    }

    async function deleteComment(commentId) {
        if (!confirm('Удалить комментарий?')) return;
        
        try {
            const res = await fetch(`/api/comments/${commentId}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            
            if (res.ok) {
                showComments(currentPostId);
                location.reload();
            } else {
                alert('Ошибка удаления');
            }
        } catch (err) {
            alert('Ошибка соединения');
        }
    }

    // Привязываем кнопки (вызвать после загрузки currentUser)
    document.addEventListener('DOMContentLoaded', () => {
        const sendBtn = document.getElementById('sendCommentBtn');
        if (sendBtn) sendBtn.onclick = sendComment;
        
        const modal = document.getElementById('commentsModal');
        if (modal) modal.onclick = (e) => {
            if (e.target === modal) closeCommentsModal();
        };
    });
</script>
